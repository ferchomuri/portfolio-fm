[build]
  command = "corepack enable && pnpm install --frozen-lockfile && pnpm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  # NEXT_PUBLIC_* values are embedded in client bundles by design (EmailJS).
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_EMAILJS_SERVICE_ID,NEXT_PUBLIC_EMAILJS_TEMPLATE_ID,NEXT_PUBLIC_EMAILJS_PUBLIC_KEY"
